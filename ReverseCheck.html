<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逆計算チェック</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./ReverseCheck.css">
</head>
<body>
    <button onclick="window.location.href='./Calculation-fixed.html'">価格計算ツールへ</button>
    <h1>逆計算チェックツール</h1>
    <p>Excelから「商品名・数量・金額」の3列をコピーして下のテキストエリアに貼り付けてください。</p>
    <textarea id="input-area" rows="1" cols="60" placeholder="商品名\t数量\t金額\n..."></textarea>
    <div class="button-container">
      <button id="check-button">チェック</button>
      <button id="clear-button">クリア</button>
    </div>
    <div id="result-area"></div>
    <script src="./data.js"></script>
    <script src="./core_data.js"></script>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
      window.FIREBASE_CONFIG = window.FIREBASE_CONFIG || {};
    </script>
    <script src="./firebase-config.js"></script>
    <script src="./core_data_fetch.js"></script>
    <script src="./core_rules.js"></script>
    <script>
      window.FEATURE_USE_FIRESTORE = true; // use Firestore
      if (window.CoreDataFetch) {
        CoreDataFetch.loadData().then(function(){
          // data loaded for reverse check
        });
      }
      // ルール自動読み込み
      if (window.CoreRules && window.FEATURE_USE_FIRESTORE) {
        CoreRules.autoLoad().then(function(r){ console.log('rules loaded', r.loaded); });
      }
    </script>
    <script>
      // 正規化キャッシュを初期化（検索/一致判定用）
      window.normalizedGoods = (window.CoreData && window.CoreData.normalizeGoods) ? window.CoreData.normalizeGoods(window.goodsData) : {};
      window.normalizedKiso = (window.CoreData && window.CoreData.normalizeKiso) ? window.CoreData.normalizeKiso(window.kisoProductsData) : {};
    </script>
    <script src="./core_pricing.js"></script>
    <script src="./core_utils.js"></script>
    <script src="./fixed_fees.js"></script>
    <script src="./reverse_check.js"></script>
    <script>
      console.log('data.js loaded');
      console.log('kisoProductsData:', typeof window.kisoProductsData, window.kisoProductsData);
    </script>
</body>
</html>
